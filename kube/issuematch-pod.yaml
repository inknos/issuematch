apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: issuematch-postgres-pgdata
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: issuematch
  labels:
    app: issuematch
spec:
  containers:
    - name: postgres
      image: docker.io/library/postgres:18
      env:
        - name: POSTGRES_DB
          value: issuematch
        - name: POSTGRES_USER
          value: issuematch
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: issuematch-secrets
              key: postgres_password
      volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql
    - name: issuematch
      image: ghcr.io/inknos/issuematch
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
      ports:
        - containerPort: 9473
      env:
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: issuematch-secrets
              key: github_client_id
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: issuematch-secrets
              key: github_client_secret
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: issuematch-secrets
              key: session_secret
        - name: BASE_URL
          valueFrom:
            secretKeyRef:
              name: issuematch-secrets
              key: base_url
        - name: DB_HOST
          value: localhost
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: issuematch
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: issuematch-secrets
              key: postgres_password
        - name: DB_NAME
          value: issuematch
  volumes:
    - name: pgdata
      persistentVolumeClaim:
        claimName: issuematch-postgres-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: issuematch
spec:
  selector:
    app: issuematch
  ports:
    - port: 9473
      targetPort: 9473
