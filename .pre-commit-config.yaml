repos:
- repo: https://github.com/commitizen-tools/commitizen
  rev: v4.13.9
  hooks:
    - id: commitizen
      stages: [commit-msg]
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.15.6
  hooks:
    # Run the linter.
    - id: ruff
      args: [ --fix ]
      exclude: '\.ipynb$'
    # Run the formatter.
    - id: ruff-format
      exclude: '\.ipynb$'
- repo: https://github.com/pre-commit/mirrors-mypy
  rev: 'v1.19.1'  # Use the sha / tag you want to point at
  hooks:
  - id: mypy
    exclude: '\.ipynb$|^alembic/'
