[project]
name = "issuematch"
version = "0.1.0"
description = "Rank GitHub issues with your team"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "sqlalchemy[asyncio]",
    "aiosqlite",
    "httpx",
    "jinja2",
    "python-multipart",
    "python-dotenv",
    "itsdangerous",
]

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
    "pytest-asyncio",
    "httpx",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
