{% extends "base.html" %}
{% block title %}Login — IssueMatch{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <h1 class="mb-3 text-center">IssueMatch</h1>
    <p class="text-muted mb-4 text-center">Rank GitHub issues with your team.</p>

    <div class="card mb-3">
      <div class="card-body">
        <form method="post" action="/auth/login" id="pw-login-form">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   required autocomplete="username">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   required autocomplete="current-password">
          </div>
          <div id="login-error" class="text-danger small mb-2"></div>
          <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
      </div>
    </div>

  </div>
</div>

<script>
document.getElementById("pw-login-form").addEventListener("submit", function(e) {
  e.preventDefault();
  var form = this;
  var errEl = document.getElementById("login-error");
  errEl.textContent = "";
  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    redirect: "manual"
  }).then(function(resp) {
    if (resp.type === "opaqueredirect" || resp.status === 303 || resp.status === 200) {
      window.location.href = "/vote";
    } else {
      return resp.json().then(function(data) {
        errEl.textContent = data.detail || "Login failed.";
      });
    }
  }).catch(function() {
    errEl.textContent = "Login failed.";
  });
});
</script>
{% endblock %}
